<div class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <h3>Registration</h3>
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-control" formControlName="Email">
            <div class="text-danger" *ngIf="registerForm.get('Email')?.invalid && registerForm.get('Email')?.touched">
              Valid email required
            </div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" class="form-control" formControlName="Password">
            <div class="text-danger" *ngIf="registerForm.get('Password')?.invalid && registerForm.get('Password')?.touched">
              Password must be at least 6 characters
            </div>
          </div>
          <div class="form-group">
            <label>Username</label>
            <input type="text" class="form-control" formControlName="Username">
            <div class="text-danger" *ngIf="registerForm.get('Username')?.invalid && registerForm.get('Username')?.touched">
              Username required
            </div>
          </div>
          <div class="form-group">
            <label>Mobile Number</label>
            <input type="text" class="form-control" formControlName="MobileNumber">
            <div class="text-danger" *ngIf="registerForm.get('MobileNumber')?.invalid && registerForm.get('MobileNumber')?.touched">
              Enter 10-digit mobile number
            </div>
          </div>
          <div class="form-group">
            <label>Role</label>
            <select class="form-control" formControlName="UserRole">
              <option value="User">User</option>
              <option value="Admin">Admin</option>
            </select>
          </div>
          <div class="text-danger" *ngIf="error">{{error}}</div>
          <button type="submit" class="btn btn-primary mt-2" [disabled]="registerForm.invalid">Register</button>
        </form>
      </div>
    </div>
</div>
