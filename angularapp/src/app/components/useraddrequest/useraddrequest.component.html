<div class="container mt-4">
  <h3>Cooking Class Request Form</h3>

  <form [formGroup]="requestForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Dietary Preferences</label>
      <input type="text" class="form-control" formControlName="DietaryPreferences" />
      <div
        *ngIf="requestForm.get('DietaryPreferences')?.invalid && requestForm.get('DietaryPreferences')?.touched"
        class="text-danger"
      >
        Dietary Preferences are required
      </div>
    </div>

    <div class="form-group">
      <label>Cooking Goals</label>
      <input type="text" class="form-control" formControlName="CookingGoals" />
      <div
        *ngIf="requestForm.get('CookingGoals')?.invalid && requestForm.get('CookingGoals')?.touched"
        class="text-danger"
      >
        Cooking Goals are required
      </div>
    </div>

    <div class="form-group">
      <label>Comments (Optional)</label>
      <textarea class="form-control" formControlName="Comments"></textarea>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="requestForm.invalid">Submit</button>
      <button type="button" class="btn btn-outline-secondary ms-2" routerLink="/user/my-requests">
        Back
      </button>
    </div>
  </form>
</div>
