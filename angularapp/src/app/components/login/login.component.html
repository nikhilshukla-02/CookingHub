<div class="login-hero gradient-anim">
  <!-- Decorative floating food icons (pure CSS-positioned) -->
  <div class="decor decor-hat d-none d-md-block" aria-hidden="true"></div>
  <div class="decor decor-spoon d-none d-md-block" aria-hidden="true"></div>
  <div class="decor decor-pan d-none d-md-block" aria-hidden="true"></div>
  <div class="decor decor-leaf d-none d-md-block" aria-hidden="true"></div>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5">
        <div class="card rounded-4 border-0 login-card glass">
          <div class="card-body p-4 p-md-5">

            <!-- Brand / Title -->
            <div class="d-flex align-items-center justify-content-between">
              <h3 class="m-0 fw-semibold brand-accent">Cooking Hub</h3>
              <i class="bi bi-egg-fried text-warning fs-3"></i>
            </div>
            <p class="mt-2 mb-4 muted">
              Learn. Cook. Serve.
              <span class="role-badges ms-2">
                <span class="badge text-bg-primary">User</span>
                <span class="badge text-bg-danger ms-1">Admin</span>
              </span>
            </p>

            <!-- Form (bindings unchanged) -->
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
              <!-- Email -->
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  [class.is-invalid]="loginForm.get('Email')?.invalid && loginForm.get('Email')?.touched"
                  formControlName="Email"
                  placeholder="you@gmail.com" />
                <div class="invalid-feedback">Valid email required</div>
              </div>

              <!-- Password -->
              <div class="mb-2">
                <label class="form-label">Password</label>
                <input
                  type="password"
                  class="form-control"
                  [class.is-invalid]="loginForm.get('Password')?.invalid && loginForm.get('Password')?.touched"
                  formControlName="Password"
                  placeholder="Password"
                  />
                <div class="invalid-feedback">Password required</div>
              </div>

              <!-- Error -->
              <div class="text-danger small mb-2" *ngIf="error">{{ error }}</div>

              <!-- Actions -->
              <div class="d-flex align-items-center justify-content-between mt-3">
                <!-- Back to Register (left) -->
                <a class="btn btn-outline-secondary btn-pill"
                   routerLink="/register"
                   title="Go to Register">
                  <i class="bi bi-arrow-left me-1"></i>
                  Back
                </a>

                <!-- Login (right) -->
                <button type="submit"
                        class="btn btn-primary btn-pill btn-glow"
                        [disabled]="loginForm.invalid">
                  Login
                  <i class="bi bi-box-arrow-in-right ms-1"></i>
                </button>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<footer class="bg-dark text-white text-center py-3">
  © 2026 Cooking Hub — All Rights Reserved
</footer>
