<div class="container mt-4">
    <h3>Class Requests for Approval</h3>
    <div class="form-group">
      <input type="text" class="form-control" placeholder="Search by Class Name" [(ngModel)]="searchText" (input)="filter()">
    </div>
    <table class="table table-bordered" *ngIf="filteredRequests.length > 0; else noData">
      <thead>
        <tr>
          <th>Request ID</th>
          <th>Class Name</th>
          <th>User ID</th>
          <th>Request Date</th>
          <th>Status</th>
          <th>Dietary Preferences</th>
          <th>Goals</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of filteredRequests">
          <td>{{r.CookingClassRequestId}}</td>
          <td>{{r.ClassName}}</td>
          <td>{{r.UserId}}</td>
          <td>{{r.RequestDate | date}}</td>
          <td>{{r.Status}}</td>
          <td>{{r.DietaryPreferences}}</td>
          <td>{{r.CookingGoals}}</td>
          <td>
            <button class="btn btn-sm btn-success" (click)="updateStatus(r.CookingClassRequestId, 'Approved')">Approve</button>
            <button class="btn btn-sm btn-danger ml-1" (click)="updateStatus(r.CookingClassRequestId, 'Rejected')">Reject</button>
          </td>
        </tr>
      </tbody>
    </table>
    <ng-template #noData>
      <p class="text-muted">Oops! No records found</p>
    </ng-template>
</div>
