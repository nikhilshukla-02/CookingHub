<div class="container mt-4">
  <h3>Applied Class Requests</h3>

  <!-- Global Search -->
  <div class="form-group mb-3">
    <input type="text" class="form-control" placeholder="Search by any field"
      [(ngModel)]="searchText" (input)="onSearchInput()">
  </div>

  <!-- AG Grid -->
  <ag-grid-angular
    class="ag-theme-alpine"
    style="width: 100%; height: 400px;"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [pagination]="pagination"
    [paginationPageSize]="paginationPageSize"
    [gridOptions]="gridOptions"
    (gridReady)="onGridReady($event)">
  </ag-grid-angular>

</div>

<!-- Edit Modal -->
<div class="modal-backdrop fade show" *ngIf="showEditModal"></div>
<div class="modal d-block" tabindex="-1" *ngIf="showEditModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Edit Cooking Class Request</h5>
        <button type="button" class="btn-close" (click)="closeEditModal()"></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="editForm">

          <div class="form-group mb-3">
            <label>Dietary Preferences</label>
            <input type="text" class="form-control" formControlName="DietaryPreferences" />
            <div *ngIf="editForm.get('DietaryPreferences')?.invalid && editForm.get('DietaryPreferences')?.touched"
              class="text-danger">Dietary Preferences are required</div>
          </div>

          <div class="form-group mb-3">
            <label>Cooking Goals</label>
            <input type="text" class="form-control" formControlName="CookingGoals" />
            <div *ngIf="editForm.get('CookingGoals')?.invalid && editForm.get('CookingGoals')?.touched"
              class="text-danger">Cooking Goals are required</div>
          </div>

          <div class="form-group mb-3">
            <label>Comments (Optional)</label>
            <textarea class="form-control" formControlName="Comments"></textarea>
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeEditModal()">Cancel</button>
        <button type="button" class="btn btn-primary"
          [disabled]="editForm.invalid"
          (click)="submitEdit()">Save Changes</button>
      </div>

    </div>
  </div>
</div>
