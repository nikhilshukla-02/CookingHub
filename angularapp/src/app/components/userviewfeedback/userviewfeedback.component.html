<div class="container mt-4">
    <h3>My Feedback</h3>
    <div *ngIf="feedbacks.length > 0; else noData">
      <div class="card mb-2" *ngFor="let fb of feedbacks">
        <div class="card-body">
          <p>{{fb.FeedbackText}}</p>
          <small class="text-muted">{{fb.Date | date}}</small>
          <button class="btn btn-sm btn-danger float-right" (click)="deleteFeedback(fb.FeedbackId!)">Delete</button>
        </div>
      </div>
    </div>
    <ng-template #noData>
      <p class="text-muted">No data found</p>
    </ng-template>
  </div>
